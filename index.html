<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIRLA OPEN MINDS INTERNATIONAL SCHOOL - QUIZ</title>
  <link rel="stylesheet" href="ai.css">
  <link rel="icon" type="image/png" href="1.jpg">
</head>
<body class="page-body">
  <main class="page-shell">
    <header class="top-header">
      <div class="school-logo-wrap">
        <img src="Birla.png" alt="School Logo" class="school-logo">
      </div>
      <h1 class="school-title">
        BIRLA OPEN MINDS INTERNATIONAL SCHOOL
      </h1>
    </header>

    <section id="quiz-fiesta-modal" class="quiz-root">
      <div id="quiz-intro-screen" class="quiz-slide-in">
        <h2 class="intro-title">Science Exhibition Quiz</h2>
        <p class="intro-subtitle">15 MCQ Questions | 4 Marks Each</p>
        <label for="quiz-student-name" class="field-label">Student Name</label>
        <input id="quiz-student-name" type="text" placeholder="Enter full name"
          class="name-input">
        <button onclick="startQuizFiesta(this)"
          class="btn btn-start quiz-start-btn">
          START
        </button>
      </div>

      <div id="quiz-questions-screen" class="hidden">
        <h3 class="questions-heading">
          <span>15 MCQ Questions</span> (4 Marks Each)
        </h3>
        <div id="quiz-questions-list" class="questions-list"></div>
        <button onclick="submitQuizFiesta()"
          class="btn btn-submit">
          SUBMIT
        </button>
      </div>

      <div id="quiz-result-screen" class="hidden">
        <h3 class="result-heading">Quiz Result</h3>
        <div id="quiz-result-box" class="result-circle">
          <p id="quiz-result-score" class="result-score"></p>
          <p id="quiz-result-percentage" class="result-percentage"></p>
        </div>
        <p id="quiz-save-status" class="save-status"></p>
        <button onclick="openQuizFiesta()"
          class="btn btn-start">
          BACK TO QUIZ HOME
        </button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
